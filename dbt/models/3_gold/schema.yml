version: 2

models:
  - name: fct_monthly_currency_avg
    description: "Агреговані дані курсів валют на місячній основі."
    columns:
      - name: currency_code
        description: "Код валюти (напр., USD, EUR)."
        tests:
          - not_null
      - name: avg_monthly_rate
        description: "Середній курс за вказаний місяць."
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: false

  - name: fct_currency_growth
    description: "Місячна динаміка росту та падіння валют (Gold layer)."
    columns:
      - name: currency_code
        description: "Код валюти."
        tests:
          - not_null
      - name: report_month
        description: "Перше число місяця, за який зроблено звіт (результат date_trunc)."
        tests:
          - not_null
      - name: month_start_rate
        description: "Курс на початок місяця."
        tests:
          - not_null
      - name: month_end_rate
        description: "Курс на кінець місяця."
        tests:
          - not_null
      - name: total_monthly_growth_pct
        description: "Загальний ріст/падіння за місяць у %."
